<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      width: 100%;
      max-width: 480px;
      height: fit-content;
      overflow: hidden;
    }

    .card-header {
      background: #4f46e5;
      padding: 24px 28px;
      color: #fff;
    }

    .card-header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: -.3px;
    }

    .card-header .subtitle {
      margin-top: 4px;
      font-size: .85rem;
      opacity: .75;
    }

    .input-row {
      display: flex;
      gap: 8px;
      padding: 20px 20px 16px;
      border-bottom: 1px solid #f0f0f0;
    }

    .input-row input {
      flex: 1;
      border: 1.5px solid #e2e8f0;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: .95rem;
      outline: none;
      transition: border-color .15s;
    }

    .input-row input:focus { border-color: #4f46e5; }

    .input-row button {
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: .95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      white-space: nowrap;
    }

    .input-row button:hover { background: #4338ca; }

    .list-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px;
      font-size: .8rem;
      color: #94a3b8;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #ef4444;
      font-size: .8rem;
      cursor: pointer;
      padding: 2px 4px;
    }

    .clear-btn:hover { text-decoration: underline; }

    ul {
      list-style: none;
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 10px;
      padding: 12px 14px;
      transition: opacity .2s;
    }

    li.done {
      opacity: .5;
    }

    li input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f46e5;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-name {
      flex: 1;
      font-size: .95rem;
      word-break: break-all;
    }

    li.done .item-name {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e1;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      transition: color .15s;
      flex-shrink: 0;
    }

    .delete-btn:hover { color: #ef4444; }

    .empty {
      text-align: center;
      color: #cbd5e1;
      font-size: .9rem;
      padding: 32px 0;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">
      <h1>🛒 쇼핑 리스트</h1>
      <p class="subtitle">오늘 사야 할 것들을 추가해 보세요</p>
    </div>

    <div class="input-row">
      <input id="itemInput" type="text" placeholder="아이템 입력..." maxlength="80" />
      <button onclick="addItem()">추가</button>
    </div>

    <div class="list-meta">
      <span id="countLabel"></span>
      <button class="clear-btn" onclick="clearDone()">완료 항목 삭제</button>
    </div>

    <ul id="list"></ul>
    <p class="empty" id="empty" style="display:none">아직 아이템이 없어요</p>
  </div>

  <script>
    const STORAGE_KEY = 'shopping-list-v1';

    let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

    function save() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const label = document.getElementById('countLabel');

      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        label.textContent = '';
        return;
      }

      empty.style.display = 'none';
      const done = items.filter(i => i.checked).length;
      label.textContent = `총 ${items.length}개 · 완료 ${done}개`;

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('done');

        const cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.checked = item.checked;
        cb.onchange = () => toggle(idx);

        const span = document.createElement('span');
        span.className = 'item-name';
        span.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = '×';
        del.title = '삭제';
        del.onclick = () => remove(idx);

        li.append(cb, span, del);
        list.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const name = input.value.trim();
      if (!name) return;
      items.unshift({ name, checked: false });
      save();
      render();
      input.value = '';
      input.focus();
    }

    function toggle(idx) {
      items[idx].checked = !items[idx].checked;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.checked);
      save();
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
